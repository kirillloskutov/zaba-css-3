<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вертикальное меню - Задание 3</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    padding: 20px;
}

/*  КОНТЕЙНЕР МЕНЮ */
.menu3 {
    width: 250px;
    border: 2px solid #000000;
    border-radius: 6px;
    overflow: hidden;
}

/*  ОСНОВНЫЕ ПУНКТЫ  */
.menu3 a.item {
    display: block;
    padding: 12px 16px;
    text-decoration: none;
    color: black;
    background: linear-gradient(to bottom, #e3e3e3, #efefef);
    border-bottom: 2px solid #ccc;
    font-weight: bold;
}

.menu3 a.item:hover {
    background: hsl(0, 0%, 94%);
}

/* БЛОК ПОДМЕНЮ  */
.menu3 .submenu {
    display: none;
    background: #ffffff;
}

/* показываем при наведении */
.menu3 .group:hover .submenu {
    display: block;
}

/* ===== ЭЛЕМЕНТЫ ВНУТРИ ===== */
.menu3 .submenu a {
    display: block;
    padding: 15px 35px;
    text-decoration: none;
    color: #333;
    border-bottom: 2px solid #e0e0e0;
    font-weight: normal;
}

.menu3 .submenu a:hover {
    background: #e0e0e0;
}
</style>
</head>

<body>

<h2>Вертикальное меню (Задание 3)</h2>

<div class="menu3">

    <!-- Главная -->
    <div class="group">
        <a class="item" href="#">Главная +</a>
        <div class="submenu">
            <a href="#">Главная страница</a>
            <a href="#">Контакты</a>
            <a href="#">О нас</a>
        </div>
    </div>

    <!-- Отделы продаж -->
    <a class="item" href="#">Отделы продаж</a>

    <!-- Услуги -->
    <div class="group">
        <a class="item" href="#"> Наши услуги +</a>
        <div class="submenu">
            <a href="#">Веб-дизайн</a>
            <a href="#">Верстка сайтов</a>
            <a href="#">SEO продвижение</a>
        </div>
    </div>

    <!-- Контакты -->
    <a class="item" href="#">Контакты</a>

     <!-- Поставщики -->
    <div class="group">
        <a class="item" href="#"> Наши поставщики +</a>
        <div class="submenu">
            <a href="#">ООО "Мекко"</a>
            <a href="#">ИП ИВАНОВ ИВАН </a>
            <a href="#">Маркетплейс Озон</a>
        </div>
    </div>

    <!-- О нас -->
    <a class="item" href="#">О нас</a>

</div>

</body>
</html>
